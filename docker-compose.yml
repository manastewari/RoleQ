services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: intervue
      POSTGRES_USER: intervue
      POSTGRES_PASSWORD: intervue
    ports:
      - "5432:5432"
    volumes:
      - intervue_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intervue -d intervue"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  intervue_postgres:
